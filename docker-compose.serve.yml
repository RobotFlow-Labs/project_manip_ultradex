services:
  serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    profiles: ["serve"]
    env_file: .env.serve
    # network_mode: host publishes all ports directly — no port mapping needed
    volumes:
      - weights:/data/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.serve
    profiles: ["api"]
    env_file: .env.serve
    environment:
      ANIMA_DEVICE: cpu
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"

  test:
    build:
      context: .
      dockerfile: Dockerfile.serve
    profiles: ["test"]
    env_file: .env.serve
    command: ["python", "-m", "pytest", "tests/", "-v"]
    volumes:
      - ./tests:/app/tests:ro

volumes:
  weights:
